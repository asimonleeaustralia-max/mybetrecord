# Local development. From the repo root:  docker compose up --build
# Then open http://localhost:8080
#
# Each service builds from the repo root so it can pull in the shared package.

x-service-env: &service-env
  DATABASE_URL: postgresql+psycopg://betrecord:betrecord@db:5432/betrecord
  JWT_SECRET: dev-only-change-me
  ENVIRONMENT: development
  CORS_ORIGINS: "*"
  FREE_DAILY_BET_LIMIT: ${FREE_DAILY_BET_LIMIT:-5}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betrecord
      POSTGRES_PASSWORD: betrecord
      POSTGRES_DB: betrecord
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betrecord"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build: { context: ., dockerfile: services/auth/Dockerfile }
    environment:
      <<: *service-env
      FRONTEND_URL: http://localhost:8080
      PASSWORD_RESET_MINUTES: ${PASSWORD_RESET_MINUTES:-60}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@mybetrecord.com}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      db: { condition: service_healthy }
    ports: ["8001:8001"]

  bets:
    build: { context: ., dockerfile: services/bets/Dockerfile }
    environment: { <<: *service-env }
    depends_on:
      db: { condition: service_healthy }
    ports: ["8002:8002"]

  reports:
    build: { context: ., dockerfile: services/reports/Dockerfile }
    environment: { <<: *service-env }
    depends_on:
      db: { condition: service_healthy }
    ports: ["8003:8003"]

  payments:
    build: { context: ., dockerfile: services/payments/Dockerfile }
    environment:
      <<: *service-env
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}          # set to enable billing
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRODUCT_ID: ${STRIPE_PRODUCT_ID:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
    depends_on:
      db: { condition: service_healthy }
    ports: ["8004:8004"]

  frontend:
    build: { context: ., dockerfile: frontend/Dockerfile }
    environment:
      AUTH_UPSTREAM: http://auth:8001
      BETS_UPSTREAM: http://bets:8002
      REPORTS_UPSTREAM: http://reports:8003
      PAYMENTS_UPSTREAM: http://payments:8004
    depends_on: [auth, bets, reports, payments]
    ports: ["8080:8080"]

volumes:
  pgdata:
