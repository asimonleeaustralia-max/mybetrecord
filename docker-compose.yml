# Local development. From the repo root:  docker compose up --build
# Then open http://localhost:8080
#
# Each service builds from the repo root so it can pull in the shared package.

x-service-env: &service-env
  DATABASE_URL: postgresql+psycopg://betrecord:betrecord@db:5432/betrecord
  JWT_SECRET: dev-only-change-me
  ENVIRONMENT: development
  CORS_ORIGINS: "*"
  FREE_DAILY_BET_LIMIT: ${FREE_DAILY_BET_LIMIT:-5}
  FREE_DAILY_MULTIPLE_LIMIT: ${FREE_DAILY_MULTIPLE_LIMIT:-5}

x-healthcheck-python: &healthcheck-python
  interval: 5s
  timeout: 5s
  retries: 12
  start_period: 40s

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betrecord
      POSTGRES_PASSWORD: betrecord
      POSTGRES_DB: betrecord
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betrecord"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build: { context: ., dockerfile: services/auth/Dockerfile }
    restart: unless-stopped
    environment:
      <<: *service-env
      FRONTEND_URL: http://localhost:8080
      PASSWORD_RESET_MINUTES: ${PASSWORD_RESET_MINUTES:-60}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@mybetrecord.com}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      db: { condition: service_healthy }
    ports: ["8001:8001"]
    healthcheck:
      <<: *healthcheck-python
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\""]

  bets:
    build: { context: ., dockerfile: services/bets/Dockerfile }
    restart: unless-stopped
    environment: { <<: *service-env }
    depends_on:
      db: { condition: service_healthy }
    ports: ["8002:8002"]
    healthcheck:
      <<: *healthcheck-python
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')\""]

  reports:
    build: { context: ., dockerfile: services/reports/Dockerfile }
    restart: unless-stopped
    environment: { <<: *service-env }
    depends_on:
      db: { condition: service_healthy }
    ports: ["8003:8003"]
    healthcheck:
      <<: *healthcheck-python
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')\""]

  payments:
    build: { context: ., dockerfile: services/payments/Dockerfile }
    restart: unless-stopped
    environment:
      <<: *service-env
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}          # set to enable billing
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRODUCT_ID: ${STRIPE_PRODUCT_ID:-}
    depends_on:
      db: { condition: service_healthy }
    ports: ["8004:8004"]
    healthcheck:
      <<: *healthcheck-python
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health')\""]

  frontend:
    build: { context: ., dockerfile: frontend/Dockerfile }
    restart: unless-stopped
    environment:
      AUTH_UPSTREAM: http://auth:8001
      BETS_UPSTREAM: http://bets:8002
      REPORTS_UPSTREAM: http://reports:8003
      PAYMENTS_UPSTREAM: http://payments:8004
    depends_on:
      auth: { condition: service_healthy }
      bets: { condition: service_healthy }
      reports: { condition: service_healthy }
      payments: { condition: service_healthy }
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

volumes:
  pgdata:
