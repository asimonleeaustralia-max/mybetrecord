# Rendered at container start by nginx's envsubst (vars below come from the env).
# Marketing pages and blog are static; the ledger SPA lives under /app/.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml application/xml;

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    location = /terms {
        try_files /terms.html =404;
    }

    location = /support {
        try_files /support.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location /blog/ {
        try_files $uri $uri/ $uri.html /blog/index.html;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /pricing/ {
        try_files $uri $uri/ $uri.html /pricing/index.html;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~ ^/share/([^/]+)$ {
        proxy_pass ${BETS_UPSTREAM}/bets/share-page/$1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location /auth/ {
        proxy_pass ${AUTH_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /bets {
        proxy_pass ${BETS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /reports/ {
        proxy_pass ${REPORTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /payments/ {
        proxy_pass ${PAYMENTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Extensions often block "/payments/" and "/billing/". Innocuous aliases for the app API.
    location /sub/ {
        rewrite ^/sub/(.*)$ /payments/$1 break;
        proxy_pass ${PAYMENTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /billing/ {
        rewrite ^/billing/(.*)$ /payments/$1 break;
        proxy_pass ${PAYMENTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /pro/ {
        rewrite ^/pro/(.*)$ /payments/$1 break;
        proxy_pass ${PAYMENTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
}
