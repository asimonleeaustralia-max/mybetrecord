# Rendered at container start by nginx's envsubst (vars below come from the env).
# Each service keeps its natural path prefix, so the SPA can call /auth, /bets,
# /reports, /payments on its own origin with no CORS gymnastics.

server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Single-page app: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ACA internal ingress requires HTTP/1.1 (default nginx upstream is 1.0 → 426).
    # Upstream env vars include the scheme: http://host:port locally, https://fqdn on Azure.
    location /auth/ {
        proxy_pass ${AUTH_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /bets {
        proxy_pass ${BETS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /reports/ {
        proxy_pass ${REPORTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    location /payments/ {
        proxy_pass ${PAYMENTS_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }
}
