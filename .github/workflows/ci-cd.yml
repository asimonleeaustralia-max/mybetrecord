name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RESOURCE_GROUP: mybetrecord-rg
  LOCATION: australiaeast

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install shared package + test deps
        run: |
          pip install ./shared
          pip install -r requirements-dev.txt
      - name: Run unit + integration tests
        run: pytest -q

  # Secrets can't be referenced in job-level `if:`, so we expose their presence
  # as an output here and gate `build-and-deploy` on that. Missing secrets =>
  # deploy is skipped (not failed), so CI stays green until Azure is wired up.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.ok }}
    steps:
      - id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure OIDC secrets (AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID) are not set; skipping deploy."
          fi

  build-and-deploy:
    needs: [test, preflight]
    if: github.ref == 'refs/heads/main' && needs.preflight.outputs.can-deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC login to Azure
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        env:
          PG_ADMIN_PASSWORD: ${{ secrets.PG_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          TAG="${GITHUB_SHA::7}"
          ./scripts/deploy.sh --skip-tests --tag "$TAG"
