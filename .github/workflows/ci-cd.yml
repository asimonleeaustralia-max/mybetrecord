name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RESOURCE_GROUP: mybetrecord-rg
  LOCATION: australiaeast

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install shared package + test deps
        run: |
          pip install ./shared
          pip install -r requirements-dev.txt
      - name: Run unit + integration tests
        run: pytest -q

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC login to Azure
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR name
        id: acr
        run: |
          ACR=$(az acr list -g "$RESOURCE_GROUP" --query "[0].name" -o tsv)
          echo "name=$ACR" >> "$GITHUB_OUTPUT"

      - name: Build & push images
        run: |
          ACR=${{ steps.acr.outputs.name }}
          TAG=${GITHUB_SHA::7}
          for svc in auth bets reports payments; do
            az acr build --registry "$ACR" \
              --image "$svc:$TAG" --image "$svc:latest" \
              --file "services/$svc/Dockerfile" .
          done
          az acr build --registry "$ACR" \
            --image "frontend:$TAG" --image "frontend:latest" \
            --file "frontend/Dockerfile" .

      - name: Deploy infrastructure + apps
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json \
            --parameters imageTag=${GITHUB_SHA::7} \
              pgAdminPassword='${{ secrets.PG_ADMIN_PASSWORD }}' \
              jwtSecret='${{ secrets.JWT_SECRET }}' \
              stripeSecretKey='${{ secrets.STRIPE_SECRET_KEY }}'
