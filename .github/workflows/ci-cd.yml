name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RESOURCE_GROUP: mybetrecord-rg
  LOCATION: australiaeast

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install shared package + test deps
        run: |
          pip install ./shared
          pip install -r requirements-dev.txt
      - name: Build blog and sitemap
        run: python scripts/build_blog.py
      - name: Run unit + integration tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Build frontend assets
        working-directory: frontend
        run: |
          npm ci
          npm run build

  e2e:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for API through nginx
        run: chmod +x scripts/wait-for-stack.sh && ./scripts/wait-for-stack.sh
      - name: Run Playwright e2e (mobile profiles)
        working-directory: e2e
        env:
          BASE_URL: http://127.0.0.1:8080
        run: npm test
      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --no-color --tail=80 auth bets reports frontend
      - name: Stop stack
        if: always()
        run: docker compose down -v

  lighthouse:
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for API through nginx
        run: chmod +x scripts/wait-for-stack.sh && ./scripts/wait-for-stack.sh
      - name: Run Lighthouse CI (mobile)
        working-directory: e2e
        env:
          BASE_URL: http://127.0.0.1:8080
        run: |
          npm ci
          npx lhci autorun --config=../.lighthouserc.js
      - name: Stop stack
        if: always()
        run: docker compose down -v

  # Secrets can't be referenced in job-level `if:`, so we expose their presence
  # as an output here and gate `build-and-deploy` on that. Missing secrets =>
  # deploy is skipped (not failed), so CI stays green until Azure is wired up.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.ok }}
    steps:
      - id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure OIDC secrets (AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID) are not set; skipping deploy."
            exit 0
          fi
          if [ -z "$SMTP_HOST" ] || [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASSWORD" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SMTP secrets (SMTP_HOST / SMTP_USER / SMTP_PASSWORD) are not set; skipping deploy so production signup emails keep working."
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: [test, frontend-build, e2e, lighthouse, preflight]
    if: github.ref == 'refs/heads/main' && needs.preflight.outputs.can-deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC login to Azure
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        env:
          PG_ADMIN_PASSWORD: ${{ secrets.PG_ADMIN_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRODUCT_ID: ${{ secrets.STRIPE_PRODUCT_ID }}
        run: |
          TAG="${GITHUB_SHA::7}"
          ./scripts/deploy.sh --skip-tests --tag "$TAG"
